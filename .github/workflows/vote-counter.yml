name: Update Priority Labels by Votes

on:
  schedule:
    # Run every day at 2am UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  count-votes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install dependencies for custom action
        run: |
          cd .github/actions/vote-counter
          npm install

      - name: Run vote counter
        id: votecounter
        uses: ./.github/actions/vote-counter
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          threshold: 5

      - name: Show result
        run: echo "Updated ${{ steps.votecounter.outputs.updated-issues }} issues"
