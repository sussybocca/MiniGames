<!DOCTYPE html>
<head>
  <title>binjgb</title>
  <link href="reset.css" rel="stylesheet">
  <style>
    /* Box sizing reset */
    html {
      box-sizing: border-box;
      height: 100%;
    }
    *, *:before, *:after {
      box-sizing: inherit;
    }
    body {
      margin: 0;
      height: 100%;
      background: #111;
      color: #eee;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    .main {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      grid-template-columns: 1fr auto;
      grid-template-rows: 1fr auto;
      background: #1a1a1a;
    }
    .main.ready {
      display: grid;
    }
    canvas {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;  /* preserves aspect ratio, fills available space */
      grid-column: 1;
      grid-row: 1;
      align-self: center;
      justify-self: center;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      background: #000;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .sidebar {
      grid-column: 2;
      grid-row: 1 / 2;
      overflow: auto;
      transition: width .2s ease-in-out;
      background: #222;
      border-left: 1px solid #444;
    }
    .overlap {
      position: absolute;
      grid-column: 1 / 2;
      grid-row: 1;
      align-self: center;
      justify-self: center;
    }
    .files {
      display: flex;
      flex-direction: column;
      width: 800px;
      max-width: 90vw;
      height: 70%;
      background: #2a2a2a;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 1.5em;
      color: #ddd;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }
    .close-button {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 2px 8px;
      background: transparent;
      border: none;
      color: #aaa;
      font-size: 1.5em;
      cursor: pointer;
    }
    .close-button:hover {
      color: #fff;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }
    .files-header {
      font-size: 1.3em;
      font-weight: 600;
      padding-bottom: 12px;
      margin: 0 auto;
      color: #fff;
    }
    .files-content {
      flex-grow: 1;
      overflow: auto;
      background: #1e1e1e;
      border-radius: 4px;
      padding: 8px;
    }
    .files-content.empty {
      font-size: 1.2em;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
    }
    .files-content > table {
      border-collapse: collapse;
      width: 100%;
      color: #ccc;
    }
    .files-footer {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      padding-top: 12px;
    }
    #files-list {
      margin: 8px 0;
      overflow: auto;
    }
    .files thead {
      border-bottom: 1px solid #444;
      color: #aaa;
      font-weight: 500;
    }
    .file:hover {
      background-color: #3a3a3a;
      cursor: pointer;
    }
    .file.selected {
      background-color: #2a5a8c;
    }
    .file-name, .file-size, .file-date {
      padding: 6px 8px;
    }
    .file-image {
      border: 1px solid #555;
      width: 160px;
      height: 144px;
      margin-left: auto;
      background: #000;
      border-radius: 4px;
    }
    .top-line {
      border-top: 1px solid #444;
    }
    #volume {
      height: 1.2em;
      width: 75px;
      vertical-align: middle;
    }
    .bar-wrap {
      width: 100%;
      padding: 8px 16px;
      grid-column: 1 / 3;
      grid-row: 2;
      background: #222;
      border-top: 1px solid #333;
    }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .bar .left, .bar .right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    #rewind {
      height: 1.2em;
      flex: 1;
      min-width: 200px;
      margin: 0 8px;
    }
    #rewindTime {
      padding: 0 8px;
      color: #ccc;
    }
    button {
      background: #333;
      border: 1px solid #555;
      color: #eee;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.2s;
    }
    button:hover:not(:disabled) {
      background: #444;
      border-color: #777;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    input[type="range"] {
      background: #333;
      height: 6px;
      border-radius: 3px;
      -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #aaa;
      border-radius: 50%;
      cursor: pointer;
    }
    input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 4px;
    }
    select {
      background: #333;
      color: #eee;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 4px;
    }
    a#downloadEl {
      display: none;
    }
  </style>
</head>
<body>
  <script src="vue.min.js"></script>
  <script src="idb.min.js"></script>
  <div class="main">
    <canvas
       v-bind:width="canvasWidth" v-bind:height="canvasHeight"
       v-show="canvas.show"
       v-bind:style="{width:canvasWidthPx, height:canvasHeightPx}">
    </canvas>
    <div class="sidebar" hidden>
    </div>
    <div class="files overlap" v-if="files.show">
      <div class="files-header">Files</div>
      <label class="close-button" @click="toggleOpenDialog">&times;</label>
      <div class="files-content" v-bind:class="{empty:isFilesListEmpty}">
        <table v-if="!isFilesListEmpty">
          <thead>
            <td class="file-name">Name</td>
            <td class="file-size">Size</td>
            <td class="file-date">Modified</td>
          </thead>
          <tbody id="files-list">
            <tr class="file"
                v-for="(file, index) in files.list"
                v-bind:class="{selected: index==files.selected}"
                @click="selectFile(index)"
                @dblclick="playFile(selectedFile)">
              <td class="file-name">{{file.name}}</td>
              <td class="file-size">{{prettySize(file.rom.size)}}</td>
              <td class="file-date">{{prettyDate(file.modified)}}</td>
            </tr>
          </tbody>
        </table>
        <div v-if="isFilesListEmpty">
          Upload a GameBoy ROM to play!
        </div>
      </div>
      <div class="files-footer top-line">
        <button @click="uploadRomClicked">Upload ROM</button>
        <input type="file" id="uploadRom" hidden @change="uploadRom">
        <button
            v-bind:disabled="isFilesListEmpty"
            @click="playFile(selectedFile)">
          Play
        </button>
        <button
            v-bind:disabled="isFilesListEmpty"
            @click="deleteFile(selectedFile)">
          Delete
        </button>
        <button
            v-bind:disabled="cantDownloadSave"
            @click="downloadSave(selectedFile)">
          Download Save
        </button>
        <button
            v-bind:disabled="isFilesListEmpty"
            @click="uploadSaveClicked">
          Upload Save
        </button>
        <input type="file" id="uploadSave" hidden @change="uploadSave">
        <img class="file-image"
            v-show="selectedFileHasImage"
            :src="selectedFileImageSrc"></img>
      </div>
    </div>
    <div class="bar-wrap top-line">
      <div class="bar">
        <div class="left">
          <button
              v-bind:disabled="files.show"
              @click="toggleOpenDialog">Open</button>
          <button v-for="scale in [1,2,3,4]"
              v-show="loaded"
              @click="canvas.scale = scale">
            {{scale}}x
          </button>
          <button
              v-show="loaded"
              @click="toggleFullscreen">Fullscreen</button>
          <span v-if="loaded">
            Vol: <input id="volume" type="range" min="0" max="1" step="0.01"
                  v-model:value="volume">
          </span>
          <button
              v-show="loaded"
              v-bind:disabled="files.show"
              @click="togglePause">{{pauseLabel}}</button>
          <input id="colorOptions" v-if="loaded" type="checkbox"
            v-model:checked="colorOptions"></input>
          <label v-if="loaded" for="colorOptions">Color Options</label>
          <button
              v-show="loaded"
              @click="toggleRecordVGM">{{vgmLabel}}</button>
        </div>
        <div class="right">
          <span>{{fps.toFixed(1)}} FPS</span>
        </div>
      </div>
      <div class="bar" v-if="colorOptions">
        <div class="left">
          <span v-if="loaded">DMG Pal: {{pal}}</span>
          <button
            v-show="loaded" @click="palDown">-</button>
          <button
            v-show="loaded" @click="palUp">+</button>
          <span v-if="loaded">CGB Colors:</span>
          <select
              v-if="loaded"
              v-model="cgbColorCurve"
              @change="setCgbColorCurve">
            <option value="0">Raw</option>
            <option value="1" selected>Sameboy</option>
            <option value="2">Gambatte</option>
          </select>
          <input id="useSgbBorder" v-if="loaded" type="checkbox"
            v-model:checked="canvas.useSgbBorder"></input>
          <label v-if="loaded" for="useSgbBorder">SGB Border</label>
          <label v-if="needsReload">(reload game for updated colors)</label>
        </div>
      </div>
      <div v-if="loaded && paused">
        <div class="bar">
          <input type="range" id="rewind"
            :min="rewind.minTicks" :max="rewind.maxTicks"
            :value="ticks" @input="rewindTo">
          <span id="rewindTime" class="right">{{rewindTime}}</span>
        </div>
      </div>
    </div>
    <a id="downloadEl" hidden download="game.sav"></a>
  </div>
  <script src="sha1.js"></script>
  <script src="binjgb.js"></script>
  <script src="demo.js"></script>
</body>
