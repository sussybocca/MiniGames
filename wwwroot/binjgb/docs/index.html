<!DOCTYPE html>
<head>
  <title>binjgb – IMMERSIVE EDITION</title>
  <link href="reset.css" rel="stylesheet">
  <style>
    /* ===== ORIGINAL STYLES (PRESERVED) ===== */
    html {
      box-sizing: border-box;
      height: 100%;
    }
    *, *:before, *:after {
      box-sizing: inherit;
    }
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    .main {
      display: none;
      position: absolute;
      margin: 0;
      width: 100%;
      height: 100%;
      grid-template-columns: 1fr auto;
      grid-template-rows: 1fr auto;
      z-index: 10; /* above Three.js canvas */
      pointer-events: none; /* allow clicks to pass through to canvas? No, we need buttons. We'll set canvas to pointer-events: none? Actually, the emulator canvas needs to receive mouse events. We'll keep .main as a grid but ensure the canvas area is clickable. */
    }
    .main.ready {
      display: grid;
    }
    /* Emulator canvas – stays on top, clickable */
    canvas {
      width: 480px;
      height: 432px;
      box-sizing: content-box;
      border: 2px solid #00ffff;
      box-shadow: 0 0 30px #00ffff, 0 0 60px #ff00ff, inset 0 0 20px rgba(0,255,255,0.3);
      grid-column: 1;
      grid-row: 1;
      align-self: center;
      justify-self: center;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      border-radius: 8px;
      transition: box-shadow 0.3s ease;
      pointer-events: auto; /* ensure clicks work */
      z-index: 20;
    }
    canvas:hover {
      box-shadow: 0 0 50px #00ffff, 0 0 100px #ff00ff, inset 0 0 30px rgba(255,0,255,0.3);
    }
    /* Sidebar, files, etc. – also need pointer events */
    .sidebar, .files, .bar-wrap, button, input, select {
      pointer-events: auto;
    }
    .sidebar {
      grid-column: 2;
      grid-row: 1 / 2;
      overflow: auto;
      transition: width .2s ease-in-out;
    }
    .overlap {
      position: absolute;
      grid-column: 1 / 2;
      grid-row: 1;
      align-self: center;
      justify-self: center;
    }
    .files {
      display: flex;
      flex-direction: column;
      width: 800px;
      height: 70%;
      background-color: rgba(20,20,40,0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 16px;
      padding: 1.5em;
      color: white;
      box-shadow: 0 0 30px rgba(0,255,255,0.2), inset 0 0 20px rgba(255,0,255,0.1);
    }
    .close-button {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 2px;
    }
    .close-button:hover {
      background-color: rgba(0,255,255,0.3);
      border-radius: 10px;
    }
    .files-header {
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
      font-size: 1.5rem;
      border-bottom: 1px solid #00ffff;
      padding-bottom: 0.5rem;
    }
    .files-content.empty {
      font-size: 125%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .files-content > table {
      border-collapse: collapse;
      border-spacing: 12px;
      width: 100%;
      color: #e0e0ff;
    }
    .files-footer {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      padding-top: 8px;
    }
    .file:hover {
      background-color: rgba(0,255,255,0.2);
      cursor: pointer;
      border-left: 3px solid #ff00ff;
    }
    .file.selected {
      background-color: rgba(138,43,226,0.4);
      border-left: 3px solid #00ffff;
    }
    .file-name, .file-size, .file-date {
      padding: 4px;
    }
    .file-image {
      border: 1px solid #00ffff;
      width: 160px;
      height: 144px;
      margin-left: auto;
      border-radius: 4px;
    }
    .top-line {
      border-top: 1px solid #00ffff;
    }
    #volume {
      height: 1em;
      width: 75px;
    }
    .bar-wrap {
      width: 100%;
      padding: 8px 0;
      grid-column: 1 / 3;
      grid-row: 2;
      background: rgba(10,10,20,0.7);
      backdrop-filter: blur(10px);
      border-top: 2px solid #00ffff;
      box-shadow: 0 -5px 30px rgba(0,255,255,0.3);
    }
    .bar {
      display: grid;
      width: 800px;
      margin: auto;
      grid-template-columns: auto 1fr auto;
      color: white;
    }
    #rewind {
      height: 1em;
      width: 100%;
      grid-column: 2;
      margin : 2px;
    }
    #rewindTime {
      padding: 0 8px;
    }
    .left {
      grid-column: 1;
    }
    .right {
      grid-column: 3;
    }
    button {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid #00ffff;
      color: #00ffff;
      text-shadow: 0 0 5px #00ffff;
      box-shadow: 0 0 10px rgba(0,255,255,0.3);
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #16213e;
      box-shadow: 0 0 20px #00ffff;
      border-color: #ff00ff;
    }
    /* ===== THREE.JS CANVAS ===== */
    #three-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none; /* so clicks go to the emulator */
    }
  </style>
</head>
<body>
  <!-- Three.js canvas (background) -->
  <canvas id="three-canvas"></canvas>

  <!-- Original scripts (Vue, IDB) -->
  <script src="vue.min.js"></script>
  <script src="idb.min.js"></script>

  <!-- Original emulator container -->
  <div class="main">
    <canvas
       v-bind:width="canvasWidth" v-bind:height="canvasHeight"
       v-show="canvas.show"
       v-bind:style="{width:canvasWidthPx, height:canvasHeightPx}">
    </canvas>
    <div class="sidebar" hidden></div>
    <div class="files overlap" v-if="files.show">
      <div class="files-header">Files</div>
      <label class="close-button" @click="toggleOpenDialog">&times;</label>
      <div class="files-content" v-bind:class="{empty:isFilesListEmpty}">
        <table v-if="!isFilesListEmpty">
          <thead>
            <td class="file-name">Name</td>
            <td class="file-size">Size</td>
            <td class="file-date">Modified</td>
          </thead>
          <tbody id="files-list">
            <tr class="file"
                v-for="(file, index) in files.list"
                v-bind:class="{selected: index==files.selected}"
                @click="selectFile(index)"
                @dblclick="playFile(selectedFile)">
              <td class="file-name">{{file.name}}</td>
              <td class="file-size">{{prettySize(file.rom.size)}}</td>
              <td class="file-date">{{prettyDate(file.modified)}}</td>
            </tr>
          </tbody>
        </table>
        <div v-if="isFilesListEmpty">
          upload a file to play!
        </div>
      </div>
      <div class="files-footer top-line">
        <button @click="uploadRomClicked">upload</button>
        <input type="file" id="uploadRom" hidden @change="uploadRom">
        <button
            v-bind:disabled="isFilesListEmpty"
            @click="playFile(selectedFile)">
          play
        </button>
        <button
            v-bind:disabled="isFilesListEmpty"
            @click="deleteFile(selectedFile)">
          delete
        </button>
        <button
            v-bind:disabled="cantDownloadSave"
            @click="downloadSave(selectedFile)">
          download save
        </button>
        <button
            v-bind:disabled="isFilesListEmpty"
            @click="uploadSaveClicked">
          upload save
        </button>
        <input type="file" id="uploadSave" hidden @change="uploadSave">
        <img class="file-image"
            v-show="selectedFileHasImage"
            :src="selectedFileImageSrc"></img>
      </div>
    </div>
    <div class="bar-wrap top-line">
      <div class="bar">
        <div class="left">
          <button
              v-bind:disabled="files.show"
              @click="toggleOpenDialog">open
          </button>
          <button v-for="scale in [1,2,3,4]"
              v-show="loaded"
              @click="canvas.scale = scale">
            {{scale}}x
          </button>
          <button
              v-show="loaded"
              @click="toggleFullscreen">fullscreen
          </button>
          <span v-if="loaded">
            vol:<input id="volume" type="range" min="0" max="1" step="0.01"
                  v-model:value="volume">
          </span>
          <button
              v-show="loaded"
              v-bind:disabled="files.show"
              @click="togglePause">{{pauseLabel}}</button>
          <input id="colorOptions" v-if="loaded" type="checkbox"
            v-model:checked="colorOptions"></input>
          <label v-if="loaded" for="colorOptions">color options...</label>
          <button
              v-show="loaded"
              @click="toggleRecordVGM">{{vgmLabel}}</button>
        </div>
        <div class="right">
          <span>{{fps.toFixed(1)}}</span> FPS
        </div>
      </div>
      <div class="bar" v-if="colorOptions">
        <div class="left">
          <span v-if="loaded">dmg pal:{{pal}}</span>
          <button
            v-show="loaded" @click="palDown">-</button><button
            v-show="loaded" @click="palUp">+</button>
          <span v-if="loaded">cgb colors:</span>
          <select
              v-if="loaded"
              v-model="cgbColorCurve"
              @change="setCgbColorCurve">
            <option value="0">Raw</option>
            <option value="1" selected>Sameboy</option>
            <option value="2">Gambatte</option>
          </select>
          <input id="useSgbBorder" v-if="loaded" type="checkbox"
            v-model:checked="canvas.useSgbBorder"></input>
          <label v-if="loaded" for="useSgbBorder">SGB border</label>
          <label v-if="needsReload">(reload game for updated colors)</label>
        </div>
      </div>
      <div v-if="loaded && paused">
        <div class="bar">
          <input type="range" id="rewind"
            :min="rewind.minTicks" :max="rewind.maxTicks"
            :value="ticks" @input="rewindTo">
          <span id="rewindTime" class="right">{{rewindTime}}</span>
        </div>
      </div>
    </div>
    <a id="downloadEl" hidden download="game.sav"></a>
  </div>

  <!-- Original scripts -->
  <script src="sha1.js"></script>
  <script src="binjgb.js"></script>
  <script src="demo.js"></script>

  <!-- Three.js immersive background (load from local folder) -->
  <script type="importmap">
    {
      "imports": {
        "three": "/wwwroot/three/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from '/three/examples/jsm/controls/OrbitControls.js';

    // --- Setup scene, camera, renderer ---
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: false, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x0a0a1a); // dark background

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    // --- Add ambient and point lights for glow ---
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight(0x00ffff, 1, 10);
    pointLight1.position.set(2, 3, 4);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xff00ff, 0.8, 10);
    pointLight2.position.set(-2, -1, 3);
    scene.add(pointLight2);

    // --- Create a rotating ring (torus) with glow ---
    const ringGeometry = new THREE.TorusGeometry(1.5, 0.05, 16, 100);
    const ringMaterial = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x004466 });
    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    ring.rotation.x = Math.PI / 2;
    ring.rotation.z = 0.3;
    scene.add(ring);

    // --- Floating particles (starfield) ---
    const particleCount = 2000;
    const particles = new THREE.BufferGeometry();
    const posArray = new Float32Array(particleCount * 3);
    const colorArray = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
      // random positions in a sphere
      const r = 3 + Math.random() * 5;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.sin(phi) * Math.sin(theta);
      const z = r * Math.cos(phi);
      posArray[i*3] = x;
      posArray[i*3+1] = y;
      posArray[i*3+2] = z;

      // colors between cyan and magenta
      const color = new THREE.Color().setHSL(0.6 + Math.random()*0.3, 1.0, 0.5);
      colorArray[i*3] = color.r;
      colorArray[i*3+1] = color.g;
      colorArray[i*3+2] = color.b;
    }

    particles.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    particles.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

    const particleMaterial = new THREE.PointsMaterial({ size: 0.1, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
    const particleSystem = new THREE.Points(particles, particleMaterial);
    scene.add(particleSystem);

    // --- Add a few smaller orbiting rings ---
    const ring2Geometry = new THREE.TorusGeometry(2.2, 0.03, 16, 100);
    const ring2Material = new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0x440044 });
    const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
    ring2.rotation.x = Math.PI / 3;
    ring2.rotation.z = 0.7;
    scene.add(ring2);

    // --- Animation loop ---
    function animate() {
      requestAnimationFrame(animate);

      // Rotate rings
      ring.rotation.y += 0.002;
      ring2.rotation.y -= 0.003;
      particleSystem.rotation.y += 0.0005;

      // Slight camera movement (optional)
      // camera.position.x = Math.sin(Date.now() * 0.0005) * 1;
      // camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();

    // --- Handle resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
