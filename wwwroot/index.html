<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniGames</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/chaos.css" />
    <link rel="stylesheet" href="css/emulators/ds.css" />
    <link rel="stylesheet" href="css/emulators/mobile.css" />
    <link rel="stylesheet" href="css/emulators/computer.css" />
    <!-- New emulators -->
    <link rel="stylesheet" href="css/emulators/gameboy.css" />
    <link rel="stylesheet" href="css/emulators/atari2600.css" />
    <link rel="stylesheet" href="css/emulators/psp.css" />
    <!-- PC emulator -->
    <link rel="stylesheet" href="css/emulators/pc.css" />
    <!-- Nintendo DS2 emulator -->
    <link rel="stylesheet" href="css/emulators/nds2.css" />
    <!-- Trippy emulator -->
    <link rel="stylesheet" href="css/emulators/trippy.css" />
    <!-- TV emulator -->
    <link rel="stylesheet" href="css/emulators/tv.css" />
    <!-- GameBoy2 emulator -->
    <link rel="stylesheet" href="css/emulators/gameboy2.css" />
</head>
<body>
    <div id="app">Loading...</div>

    <script src="js/chaos.js"></script>
    <script src="js/ds-input.js"></script>
    <script src="js/mobile-input.js"></script>
    <script src="js/computer-input.js"></script>
    <!-- New emulator input scripts -->
    <script src="js/gameboy-input.js"></script>
    <script src="js/atari2600-input.js"></script>
    <script src="js/psp-input.js"></script>
    <!-- PC emulator input -->
    <script src="js/pc-input.js"></script>
    <!-- Trippy canvas helper -->
    <script src="js/canvasHelper.js"></script>
    <!-- DS2 emulator helper (touch coordinates) -->
    <script>
        window.getElementRect = function(element) {
            const rect = element.getBoundingClientRect();
            return {
                left: rect.left,
                top: rect.top,
                width: rect.width,
                height: rect.height
            };
        };
    </script>
    <!-- GameBoy2 emulator input -->
    <script src="js/gameboy2-input.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
