<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Web Gallery – Performance Optimized</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            border-left: 4px solid #ff00ff;
            text-shadow: 0 0 10px cyan;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: cyan;
            font-size: 24px;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 20px;
            border: 2px solid magenta;
            box-shadow: 0 0 30px magenta;
            z-index: 200;
            transition: opacity 1s;
        }
        #perf-toggle {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.7);
            color: cyan;
            border: 2px solid magenta;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 300;
            font-weight: bold;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }
        #perf-toggle:hover {
            background: magenta;
            color: black;
            border-color: cyan;
        }
        .screen {
            width: 800px;
            height: 600px;
            background: #111;
            border: 3px solid #00ffff;
            border-radius: 16px;
            box-shadow: 0 0 50px rgba(0,255,255,0.5), 0 0 100px rgba(255,0,255,0.3);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: box-shadow 0.3s;
            will-change: transform; /* GPU hint */
        }
        .screen:hover {
            box-shadow: 0 0 80px cyan, 0 0 150px magenta;
        }
        iframe, img, video, model-viewer {
            width: 100%;
            height: 100%;
            border: none;
            background: black;
            object-fit: contain;
        }
        .audio-player {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
        }
        .audio-player audio {
            width: 80%;
            margin-top: 20px;
        }
        .label {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px magenta, 0 0 20px cyan;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 5px 0;
            backdrop-filter: blur(5px);
        }
        /* Hide offscreen screens (used with IntersectionObserver) */
        .screen-hidden {
            visibility: hidden;
        }
    </style>
    <!-- Import model-viewer for 3D models -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
    <div id="info">
        <h2>🌀 IMMERSIVE GALLERY</h2>
        <p>Every file from <code>/three/</code> floats as an interactive screen.</p>
    </div>
    <div id="loading">📦 LOADING THE MULTIVERSE...</div>
    <div id="perf-toggle">⚡ PERFORMANCE MODE (AUTO)</div>

    <!-- Import maps -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

        // --- Performance detection and settings ---
        const isLowEndDevice = navigator.hardwareConcurrency <= 4 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        let performanceMode = isLowEndDevice; // auto-enable on low-end devices
        const perfToggle = document.getElementById('perf-toggle');
        perfToggle.textContent = performanceMode ? '⚡ PERFORMANCE MODE (ON)' : '⚡ PERFORMANCE MODE (OFF)';
        perfToggle.addEventListener('click', () => {
            performanceMode = !performanceMode;
            perfToggle.textContent = performanceMode ? '⚡ PERFORMANCE MODE (ON)' : '⚡ PERFORMANCE MODE (OFF)';
            applyPerformanceSettings();
        });

        function applyPerformanceSettings() {
            // Update star visibility / count
            stars.forEach(star => {
                star.style.display = performanceMode ? 'none' : 'block';
            });
            // Reduce shadow map size if using WebGL (not applicable here)
            // Adjust observer thresholds
        }

        // --- Setup scene, camera, renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 30);

        const renderer = new CSS3DRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        renderer.domElement.style.pointerEvents = 'auto';
        document.body.appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;
        controls.maxPolarAngle = Math.PI / 2;
        controls.minDistance = 10;
        controls.maxDistance = 80;

        // --- Create a cosmic background (simplified for performance) ---
        const starField = document.createElement('div');
        starField.style.position = 'absolute';
        starField.style.width = '100%';
        starField.style.height = '100%';
        starField.style.pointerEvents = 'none';
        starField.style.zIndex = '-1';
        document.body.appendChild(starField);

        const stars = [];
        const starCount = performanceMode ? 100 : 200; // dynamic, but initially set based on device
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = (Math.random() * 2 + 1) + 'px';
            star.style.height = star.style.width;
            star.style.backgroundColor = `hsl(${Math.random() * 60 + 200}, 100%, 70%)`;
            star.style.borderRadius = '50%';
            star.style.boxShadow = '0 0 6px currentColor';
            // No animation to save CPU
            starField.appendChild(star);
            stars.push(star);
        }

        // --- Loading manager with lazy loading ---
        const loadingDiv = document.getElementById('loading');
        let totalFiles = 0;
        let loadedFiles = 0;

        // IntersectionObserver to pause off-screen videos/model-viewers and lazy-load iframes
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const screen = entry.target;
                const iframe = screen.querySelector('iframe');
                const video = screen.querySelector('video');
                const modelViewer = screen.querySelector('model-viewer');
                
                if (entry.isIntersecting) {
                    // Lazy-load iframe src if not loaded
                    if (iframe && !iframe.src) {
                        iframe.src = iframe.dataset.src;
                    }
                    // Play video if it exists
                    if (video) video.play();
                    // Model-viewer automatically loads when visible
                } else {
                    // Pause video to save resources
                    if (video) video.pause();
                    // Optionally disable model-viewer rendering? Not easily done, but we can hide it
                    if (modelViewer) modelViewer.style.visibility = 'hidden';
                }
            });
        }, { threshold: 0.1, rootMargin: '200px' });

        // --- Function to create a CSS3D object from a file ---
        function createScreen(filePath, fileName, ext) {
            const div = document.createElement('div');
            div.className = 'screen';

            // Content based on extension
            if (ext === 'html' || ext === 'htm') {
                const iframe = document.createElement('iframe');
                // Store src in data attribute for lazy loading
                iframe.dataset.src = filePath;
                iframe.sandbox = 'allow-scripts allow-same-origin allow-forms';
                // No src initially
                div.appendChild(iframe);
            } 
            else if (['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'].includes(ext)) {
                const img = document.createElement('img');
                img.loading = 'lazy'; // native lazy
                img.src = filePath;
                img.alt = fileName;
                div.appendChild(img);
            }
            else if (['mp4', 'webm', 'ogg', 'mov'].includes(ext)) {
                const video = document.createElement('video');
                video.src = filePath;
                video.controls = true;
                video.loop = true;
                video.preload = 'metadata'; // don't preload full video
                div.appendChild(video);
            }
            else if (['mp3', 'wav', 'ogg', 'm4a'].includes(ext)) {
                const audioDiv = document.createElement('div');
                audioDiv.className = 'audio-player';
                const title = document.createElement('h3');
                title.textContent = fileName;
                const audio = document.createElement('audio');
                audio.src = filePath;
                audio.controls = true;
                audio.preload = 'none';
                audioDiv.appendChild(title);
                audioDiv.appendChild(audio);
                div.appendChild(audioDiv);
            }
            else if (['gltf', 'glb', 'obj', 'stl', 'fbx'].includes(ext)) {
                const modelViewer = document.createElement('model-viewer');
                modelViewer.setAttribute('src', filePath);
                modelViewer.setAttribute('auto-rotate', '');
                modelViewer.setAttribute('camera-controls', '');
                modelViewer.setAttribute('shadow-intensity', '1');
                modelViewer.setAttribute('environment-image', 'neutral');
                modelViewer.style.backgroundColor = '#111';
                // Disable shadows in performance mode
                if (performanceMode) {
                    modelViewer.setAttribute('shadow-intensity', '0');
                }
                div.appendChild(modelViewer);
            }
            else {
                // Fallback: show file name and extension
                const fallback = document.createElement('div');
                fallback.style.width = '100%';
                fallback.style.height = '100%';
                fallback.style.display = 'flex';
                fallback.style.alignItems = 'center';
                fallback.style.justifyContent = 'center';
                fallback.style.background = '#1a1a2e';
                fallback.style.color = 'white';
                fallback.style.fontSize = '24px';
                fallback.style.flexDirection = 'column';
                fallback.innerHTML = `<span style="font-size:48px;">📄</span><br>${fileName}`;
                div.appendChild(fallback);
            }

            // Add a label
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = fileName;
            div.appendChild(label);

            // Observe for intersection
            observer.observe(div);

            return new CSS3DObject(div);
        }

        // --- Fetch asset list ---
        fetch('sandbox.json')
            .then(res => res.json())
            .then(files => {
                totalFiles = files.length;

                // Arrange screens in a giant spiral
                files.forEach((filePath, index) => {
                    const fileName = filePath.split('/').pop() || filePath;
                    const ext = fileName.split('.').pop().toLowerCase();

                    // Spiral coordinates
                    const t = index / files.length;
                    const angle = t * Math.PI * 12;
                    const radius = 15 + t * 20;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    const y = Math.sin(angle * 3) * 4;

                    const screen = createScreen(filePath, fileName, ext);
                    screen.position.set(x, y, z);

                    // Let them face outward
                    screen.lookAt(x * 2, y, z * 2);

                    scene.add(screen);

                    loadedFiles++;
                    if (loadedFiles === totalFiles) {
                        loadingDiv.style.opacity = '0';
                        setTimeout(() => loadingDiv.style.display = 'none', 1000);
                    }
                });
            })
            .catch(err => {
                console.error('Failed to load sandbox.json:', err);
                loadingDiv.innerHTML = '❌ Failed to load asset list. Make sure sandbox.json exists.';
            });

        // --- Simple FPS monitor for adaptive quality (optional) ---
        let lastTime = performance.now();
        let frames = 0;
        let fps = 60;

        function measureFPS() {
            frames++;
            const now = performance.now();
            const delta = now - lastTime;
            if (delta >= 1000) {
                fps = frames * 1000 / delta;
                frames = 0;
                lastTime = now;
                // If FPS drops too low, enable performance mode automatically
                if (fps < 30 && !performanceMode) {
                    performanceMode = true;
                    perfToggle.textContent = '⚡ PERFORMANCE MODE (ON)';
                    applyPerformanceSettings();
                }
            }
            requestAnimationFrame(measureFPS);
        }
        // Start FPS monitoring (uncomment if desired)
        // measureFPS();

        // --- Animation loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // --- Resize handler ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
